name: Backend API Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vulpine_tasks_test
          POSTGRES_USER: vulpine_user
          POSTGRES_PASSWORD: vulpine_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup database tables
        run: ./gradlew test --tests "SetupDatabaseTest" --no-daemon
        env:
          DB_URL: jdbc:postgresql://localhost:5432/vulpine_tasks_test
          DB_USER: vulpine_user
          DB_PASSWORD: vulpine_password

      - name: Run API tests
        run: ./gradlew test --tests "UserFlowTest" --no-daemon
        env:
          DB_URL: jdbc:postgresql://localhost:5432/vulpine_tasks_test
          DB_USER: vulpine_user
          DB_PASSWORD: vulpine_password

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: build/reports/tests/