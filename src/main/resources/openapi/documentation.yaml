openapi: 3.0.0

info:
  title: Vulpine Tasks API
  version: 1.0.0

paths:

  /auth/register:
    post:
      summary: Регистрация
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: test@gmail.com
                password:
                  type: string
                  example: 1234567
      responses:
        "200":
          description: OK

  /auth/login:
    post:
      summary: Логин
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: JWT token returned

  /users/me:
    get:
      summary: Текущий пользователь
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK

  /notes:
    post:
      summary: Создать заметку
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, type]
              properties:
                title:
                  type: string
                type:
                  type: string
                  example: task
                parentId:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Created note

    get:
      summary: Получить заметки
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: parentId
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of notes

  /notes/{id}:
    get:
      summary: Получить заметку по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Note

    put:
      summary: Обновить title
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
      responses:
        "200":
          description: Updated

    delete:
      summary: Удалить заметку
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      responses:
        "200":
          description: Deleted

  /notes/{id}/content:
    get:
      summary: Получить содержимое файла заметки
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      responses:
        "200":
          description: Markdown content

    put:
      summary: Обновить содержимое заметки
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
      responses:
        "200":
          description: Updated content

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT