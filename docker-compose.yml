version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vulpine-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vulpine_tasks
      POSTGRES_USER: vulpine_user
      POSTGRES_PASSWORD: vulpine_password
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    container_name: vulpine-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/vulpine_tasks
      DB_USER: vulpine_user
      DB_PASSWORD: vulpine_password
    command: java -jar app.jar -port=8080
    depends_on:
      - postgres
